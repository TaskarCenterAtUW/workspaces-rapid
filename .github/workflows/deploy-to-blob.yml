name: Release to Azure Blob Storage
on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environment to deploy to'
                required: true
                default: 'develop'
                type: choice
                options:
                    - develop
                    - staging
                    - production
            version:
                description: 'Version to deploy'
                required: true
                default: 'latest'
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
              with:
                ref: ${{ github.event.inputs.environment }}

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '16'
            # Infer the environment from the workflow input and set the appropriate environment variable
            - name: Set the target container
              run: |
                    if [ "${{ github.event.inputs.environment }}" == "develop" ]; then
                        echo "TARGET_CONTAINER=dev" >> $GITHUB_ENV
                    elif [ "${{ github.event.inputs.environment }}" == "staging" ]; then
                        echo "TARGET_CONTAINER=stage" >> $GITHUB_ENV
                    elif [ "${{ github.event.inputs.environment }}" == "production" ]; then
                        echo "TARGET_CONTAINER=prod" >> $GITHUB_ENV
                    else
                        echo "Invalid environment specified"
                        exit 1
                    fi
            
            - name: Gather build artifacts
              run: |
                  mkdir -p build
                  cp -r dist/* build/
                  echo "Files in build directory:"
                  ls -R build         
            - name: Upload to Azure Blob Storage
              uses: LanceMcCarthy/Action-AzureBlobUpload@v3
              with:
                source_folder: 'build'
                connection_string: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
                container_name: 'editor'
                destination_folder: '${{ env.TARGET_CONTAINER }}'
                delete_if_exists: true