server {
    listen 80;
    root /usr/share/nginx/html;

    # Custom MIME types not in nginx's default mime.types
    types {
        application/json5   json5;
        application/jsonc   jsonc;
    }
    include /etc/nginx/mime.types;

    # Compress text-based assets on the fly
    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/json5 application/jsonc image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri $uri/ =404;
    }
}
